<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUSORI | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cu-bronze: #B87333;
            --pitch-black: #000000;
            --text-base: #E0E0E0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--pitch-black);
            color: var(--text-base);
            font-family: 'Inter', sans-serif;
            /* Changed to min-height so it can expand if needed */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            /* Unlocked vertical scroll, but kept horizontal scroll locked */
            overflow-x: hidden; 
        }

        /* --- HEADER --- */
        .header {
            margin-top: 6vh;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .header-logo {
            max-width: 180px;
            object-fit: contain;
        }

        /* --- HERO: SHROUDED WATCH --- */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            /* Added padding so it doesn't crowd the logo/footer when scrolling */
            padding: 40px 0; 
        }
        .shrouded-watch {
            max-width: 85%;
            max-height: 55vh;
            object-fit: contain;
            filter: brightness(0.6) contrast(1.4);
        }

        /* --- FOOTER CONTAINER (Form + Legal) --- */
        .footer {
            margin-bottom: 5vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .coming-soon-text {
            font-size: 0.8rem;
            letter-spacing: 0.25em;
            color: #777;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .signup-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px;
            padding: 0 20px;
        }
        .email-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            font-size: 0.95rem;
            padding: 10px 5px;
            margin-bottom: 25px;
            text-align: center;
            outline: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.15em;
            transition: border-bottom 0.3s ease;
        }
        .email-input::placeholder {
            color: #444;
        }
        .email-input:focus {
            border-bottom: 1px solid var(--cu-bronze);
        }
        .submit-btn {
            background: transparent;
            color: var(--cu-bronze);
            border: 1px solid var(--cu-bronze);
            padding: 14px 35px;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            background: var(--cu-bronze);
            color: var(--pitch-black);
        }

        /* --- NEW LEGAL & CONTACT FOOTER --- */
        .legal-footer {
            margin-top: 35px;
            text-align: center;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 0.15em;
            line-height: 1.8;
        }
        .legal-footer a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .legal-footer a:hover {
            color: var(--cu-bronze);
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .header-logo { max-width: 150px; }
            .coming-soon-text { font-size: 0.7rem; }
            .legal-footer { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="header-logo.png" alt="FUSORI" class="header-logo">
    </div>

    <div class="hero">
        <img src="shrouded-watch.png" alt="The Fusori Serpent" class="shrouded-watch">
    </div>

    <div class="footer">
        <div class="coming-soon-text">FIRST EDITION • COMING SOON</div>
        
        <form class="signup-form" name="Waitlist" method="POST" data-netlify="true" netlify action="/">
            <input type="hidden" name="form-name" value="Waitlist">
            
            <input type="email" name="email" class="email-input" placeholder="ENTER EMAIL ADDRESS" required>
            <button type="submit" class="submit-btn">REQUEST INFORMATION</button>
        </form>

        <div class="legal-footer">
            &copy; 2026 FUSORI. ALL RIGHTS RESERVED.<br>
            <a href="mailto:info@fusori.com">CONTACT: INFO@FUSORI.COM</a>
        </div>
    </div>

</body>
</html>
